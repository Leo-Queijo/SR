<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CRM Hospitalar 360º — Agenda Médica</title>

      colors:{
        brand_blue:'#005BFF',

<div class="flex min-h-screen">

<!-- SIDEBAR -->

<aside class="hidden md:flex flex-col w-64 bg-white dark:bg-slate-800 shadow-xl p-6 gap-6 fixed md:static inset-y-0 z-50">
  <div class="flex items-center gap-3">
    <div class="h-12 w-12 rounded-xl bg-brand_blue text-white flex items-center justify-center text-xl font-bold shadow-md">SR</div>
    <div>
      <h1 class="text-lg font-bold text-gray-900 dark:text-slate-100">CRM São Rafael</h1>
      <p class="text-sm text-gray-500 dark:text-slate-400 -mt-1">Agenda Médica</p>
    </div>
  </div>
  <nav class="flex flex-col gap-2 flex-1">
    <a href="./index.html" class="px-4 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700">Menu</a>

  </nav>

<!-- CONTEÚDO -->

<main class="flex-1 p-8 space-y-6">

<h1 class="text-2xl font-bold">Agenda Médica</h1>

<section class="bg-white dark:bg-slate-800 p-5 rounded-card shadow">
<h2 class="text-xs text-gray-500 mb-2">1️⃣ Médico</h2>
<select id="doctorSelect" class="w-full p-3 border rounded-lg">
  <option>Dr. João Silva — Cardiologia</option>
  <option>Dra. Marina Costa — Dermatologia</option>
  <option>Dr. Felipe Andrade — Ortopedia</option>
</select>
</section>

<section class="bg-white dark:bg-slate-800 p-5 rounded-card shadow">
<h2 class="text-xs text-gray-500 mb-2">2️⃣ Paciente</h2>
<div class="grid gap-3">
<input id="pacienteNome" class="p-3 border rounded-lg" placeholder="Nome do paciente">
<input id="pacienteTelefone" class="p-3 border rounded-lg" placeholder="WhatsApp (DDD + número)">
</div>
</section>

<div class="grid md:grid-cols-2 gap-6">

<section class="bg-white dark:bg-slate-800 p-5 rounded-card shadow">
<div class="flex justify-between items-center mb-3">
<button onclick="changeMonth(-1)">◀</button>
<h2 id="monthLabel" class="font-semibold"></h2>
<button onclick="changeMonth(1)">▶</button>
</div>

<div class="grid grid-cols-7 text-center text-xs font-semibold text-gray-500 mb-2">
  <div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div>
  <div>Sex</div><div>Sáb</div><div>Dom</div>
</div>

<div id="calendar" class="grid grid-cols-7 gap-2"></div>
</section>

<section class="bg-white dark:bg-slate-800 p-5 rounded-card shadow">
<h2 class="font-semibold mb-2">Horários</h2>
<p id="selectedDate" class="text-sm text-gray-500 mb-2"></p>
<div id="timeSlots" class="grid grid-cols-2 gap-2"></div>
</section>

</div>

</main>
</div>

<script>
const calendar=document.getElementById("calendar");
const monthLabel=document.getElementById("monthLabel");
const timeSlotsEl=document.getElementById("timeSlots");
const selectedDateEl=document.getElementById("selectedDate");

let current=new Date(), selectedKey=null, selectedSlot=null, selectedDateRef=null;

const horarios=[
"08:00","08:30","09:00","09:30",
"10:00","10:30","14:00","14:30",
"15:00","15:30","16:00"
];

const load=()=>JSON.parse(localStorage.getItem("agenda")||"{}");
const save=d=>localStorage.setItem("agenda",JSON.stringify(d));

function renderCalendar(){
calendar.innerHTML="";
const y=current.getFullYear(),m=current.getMonth();
monthLabel.textContent=current.toLocaleString("pt-BR",{month:"long",year:"numeric"});

let first=new Date(y,m,1).getDay();
first = first === 0 ? 6 : first - 1;

const last=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++){
  calendar.appendChild(document.createElement("div"));
}

for(let d=1;d<=last;d++){
const el=document.createElement("div");
el.textContent=d;
el.className="p-2 border rounded text-center cursor-pointer hover:bg-blue-100";
el.onclick=()=>loadDay(d,m,y);
calendar.appendChild(el);
}
}

function changeMonth(n){
current.setMonth(current.getMonth()+n);
renderCalendar();
}

function loadDay(d,m,y){
const date=new Date(y,m,d);
selectedKey=date.toISOString().split("T")[0];
selectedDateRef=selectedKey;
selectedDateEl.textContent=date.toLocaleDateString("pt-BR");
timeSlotsEl.innerHTML="";
const data=load()[selectedKey]||{};

horarios.forEach(h=>{
const btn=document.createElement("button");
const slot=data[h];
btn.className="p-2 rounded-lg border text-sm font-medium w-full";

if(slot){
btn.classList.add(
slot.status==="confirmado"?"bg-green-200":
slot.status==="atendente"?"bg-yellow-200":"bg-gray-200"
);
btn.innerHTML=`${h}<span class="block text-xs">${slot.status}</span>`;
btn.onclick=()=>{
  selectedSlot=h;
  loadDay(d,m,y);
};
}else{
btn.classList.add("bg-green-50","hover:bg-green-100");
btn.textContent=h;
btn.onclick=()=>{
  selectedSlot=h;
  agendar(h);
};
}


timeSlotsEl.appendChild(btn);
});
}

function agendar(h){
const nome=pacienteNome.value.trim();
const tel=pacienteTelefone.value.trim();
if(!nome||!tel)return alert("Preencha os dados");

const data=load();
if(!data[selectedKey])data[selectedKey]={};

data[selectedKey][h]={
nome,
tel,
medico:doctorSelect.value,
status:"pendente"
};

save(data);
enviarWhatsApp(nome,tel,h);
loadDay(new Date(selectedKey).getDate(),current.getMonth(),current.getFullYear());
alert("🔔 Agendamento criado (pendente)");
}

function enviarWhatsApp(nome,tel,h){
const linkBase = window.location.origin + window.location.pathname;

const msg=encodeURIComponent(
`Olá ${nome} 👋
Consulta agendada:

📅 ${selectedKey}
⏰ ${h}

Confirme clicando:
${linkBase}?acao=1&data=${selectedKey}&hora=${h}

Ou desmarque:
${linkBase}?acao=2&data=${selectedKey}&hora=${h}

Ou falar com atendente:
${linkBase}?acao=3&data=${selectedKey}&hora=${h}`
);

window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${msg}`,"_blank");
}

// 🔥 CAPTURA AÇÃO VIA LINK (SIMULA WHATSAPP)
function tratarAcaoURL(){
const params=new URLSearchParams(window.location.search);
const acao=params.get("acao");
const dataKey=params.get("data");
const hora=params.get("hora");

if(!acao || !dataKey || !hora) return;

const data=load();
if(!data[dataKey] || !data[dataKey][hora]) return;

if(acao==="1"){
data[dataKey][hora].status="confirmado";
alert("✔ Consulta confirmada pelo paciente");
}
if(acao==="2"){
delete data[dataKey][hora];
alert("❌ Consulta cancelada pelo paciente");
}
if(acao==="3"){
data[dataKey][hora].status="atendente";
alert("🧑‍💼 Paciente pediu atendente");
}

save(data);

// limpa URL
window.history.replaceState({}, document.title, window.location.pathname);
}

// teclado continua funcionando
document.addEventListener("keydown",e=>{
if(!selectedKey || !selectedSlot) return;

const data=load();

if(!data[selectedKey] || !data[selectedKey][selectedSlot]) return;

const slot=data[selectedKey][selectedSlot];

if(e.key==="1"){slot.status="confirmado";alert("✔ Consulta confirmada");}
if(e.key==="2"){delete data[selectedKey][selectedSlot];alert("❌ Consulta desmarcada");}
if(e.key==="3"){slot.status="atendente";alert("🧑‍💼 Encaminhado ao atendente");}

save(data);
loadDay(
new Date(selectedKey).getDate(),
current.getMonth(),
current.getFullYear()
);
});

tratarAcaoURL();
renderCalendar();
</script>

</body>
